name: snap_reels
description: A powerful, customizable Flutter widget for creating TikTok/Instagram-style vertical video reels with advanced features like caching, analytics, and rich interactions.
version: 2.1.1
homepage: https://github.com/PAzter1101/snap_reels
repository: https://github.com/PAzter1101/snap_reels
issue_tracker: https://github.com/PAzter1101/snap_reels/issues

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  visibility_detector: ^0.4.0+2
  get: ^4.7.3
  crypto: ^3.0.6
  dio: ^5.9.2
  path_provider: ^2.1.5
  lottie: ^3.3.2

  # Utilities
  share_plus: ^12.0.1
  
  # Platform specific
  wakelock_plus: ^1.5.1
  device_info_plus: ^12.3.0
  iconly: ^1.0.1
  font_awesome_flutter: ^11.0.0
  
  # Network and connectivity
  connectivity_plus: ^7.0.0

  # New dependency
  like_button: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.5.0
  build_runner: ^2.5.0

flutter:
  assets:
    - assets/reel-loading.json

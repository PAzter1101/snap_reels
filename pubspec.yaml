name: snap_reels
description: A powerful, customizable Flutter widget for creating TikTok/Instagram-style vertical video reels with advanced features like caching, analytics, and rich interactions.
version: 2.3.1
homepage: https://github.com/PAzter1101/snap_reels
repository: https://github.com/PAzter1101/snap_reels
issue_tracker: https://github.com/PAzter1101/snap_reels/issues

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  visibility_detector: ^0.4.0+2
  get: ^4.7.3
  crypto: ^3.0.6
  dio: ^5.9.2
  path_provider: ^2.1.5
  lottie: ^3.3.3

  # Platform specific
  wakelock_plus: ^1.6.0
  device_info_plus: ^13.0.0
  iconly: ^1.0.1
  font_awesome_flutter: ^11.0.0
  
  # Network and connectivity
  connectivity_plus: ^7.1.1

  # New dependency
  like_button: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  mockito: ^5.6.4
  build_runner: ^2.13.1
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  assets:
    - assets/reel-loading.json
